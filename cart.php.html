<html lang="bs">
<head>
  <meta charset="UTF-8">
 <title>Windows Configurator</title>
<meta property="og:title" content="Windows Configurator" /> 
<meta property="og:description" content="Windows Configurator"/> 
 
<link rel="shortcut icon" type="image/x-icon" href="img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      /* KonfigFenster boje */
      --kf-yellow: #F6A800;
      --kf-blue:   #3AC6FF;
      --kf-green:  #7BC043;
      --kf-red:    #FF315A;

      --bg: #f5f6f8;
      --card-bg: #ffffff;
      --text-main: #222;
      --text-muted: #666;
      --border-soft: rgba(0,0,0,0.08);

      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow-soft: 0 10px 25px rgba(0,0,0,0.06);
    }
	
	
	#delimg{width:18px; padding:5px;}

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      padding: 30px;
      color: var(--text-main);
    }

    .page {
      max-width: 1180px;
      margin: auto;
    }

    /* HEADER */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .badge {
      background: var(--kf-blue);
      color: #000;
      padding: 6px 14px;
      border-radius: 10px;
      font-weight: 600;
      box-shadow: 0 0 0 3px rgba(58,198,255,0.25);
    }

    @media (max-width: 760px) {
      .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 22px;
    }

    @media (max-width: 880px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      padding: 22px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-soft);
    }

    /* BORDER U LOGO BOJAMA */
    .border-yellow { border-top: 4px solid var(--kf-yellow); }
    .border-blue   { border-top: 4px solid var(--kf-blue); }
    .border-green  { border-top: 4px solid var(--kf-green); }
    .border-red    { border-top: 4px solid var(--kf-red); }

    /* CART ITEM */
    .cart-item {
      display: grid;
      grid-template-columns: 150px 1.6fr 110px 100px;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px dashed rgba(0,0,0,0.1);
      align-items: center;
    }

    @media (max-width: 780px) {
      .cart-item {
        grid-template-columns: 130px 1fr;
        grid-template-rows: auto auto auto;
      }
    }

    .cart-thumb {
      width: 150px;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #e9edf0, #dcdfe3);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08),
                  0 8px 16px rgba(0,0,0,0.1);
    }

    .cart-info-title {
      font-size: 16px;
      font-weight: 600;
    }

    .cart-info-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin: 6px 0;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 999px;
      font-weight: 600;
      color: #000;
      margin-right: 5px;
    }

    .tag-yellow { background: var(--kf-yellow); }
    .tag-blue   { background: var(--kf-blue); }
    .tag-green  { background: var(--kf-green); }
    .tag-red    { background: var(--kf-red); }

    .qty-control {
      display: inline-flex;
      background: #f1f2f4;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 17px;
  
    }
	a {
    text-decoration: none;
}

    .qty-value {
      width: 40px;
      text-align: center;
      font-size: 14px;
      line-height: 32px;
    }

    .cart-item-price {
      text-align: right;
      font-weight: 700;
      font-size: 16px;
    }

    .cart-item-price small {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-top: 4px;
    }

    /* SUMMARY */
    .summary-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .summary-row.total span:last-child {
      font-size: 20px;
      color: var(--kf-green);
      font-weight: 700;
    }

    .promo {
      margin: 18px 0;
      padding: 10px;
      border: 1px dashed rgba(0,0,0,0.15);
      border-radius: var(--radius-md);
      display: flex;
      gap: 8px;
      background: #fafafa;
    }

    .promo input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
    }

    .promo button {
      background: var(--kf-red);
      color: #000;
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--kf-blue);
      color: #000;
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      font-size: 15px;
      box-shadow: 0 0 0 4px rgba(58,198,255,0.3);
	  margin-bottom:20px;
	    margin-top:20px;
    }

    .btn-secondary {
      border: 1px solid var(--kf-green);
      color: var(--kf-green);
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      background: transparent;
    }
  </style>
</head>
