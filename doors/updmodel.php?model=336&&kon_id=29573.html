@import url("https://fonts.googleapis.com/css?family=Raleway:400");

 
@property --angle {
  syntax: '<angle>';
  initial-value: 90deg;
  inherits: true;
}

@property --gradX {
  syntax: '<percentage>';
  initial-value: 50%;
  inherits: true;
}

@property --gradY {
  syntax: '<percentage>';
  initial-value: 0%;
  inherits: true;
}
 

:root {
  --d: 10500ms;
  --angle: 90deg;
  --gradX: 100%;
  --gradY: 50%;
  --c1: rgba(168, 239, 255, 1);
  --c2: rgba(168, 239, 255, 0.1);
}

 
.box {
 
  
  border: 0.25rem solid;
 
  border-image: conic-gradient(from var(--angle), var(--c2), var(--c1) 0.1turn, var(--c1) 0.15turn, var(--c2) 0.25turn) 30;
  animation: borderRotate var(--d) linear infinite forwards;
}

.box:nth-child(2) {
  border-image: radial-gradient(ellipse at var(--gradX) var(--gradY), var(--c1), var(--c1) 10%, var(--c2) 40%) 30;
  animation: borderRadial var(--d) linear infinite forwards;
}

@keyframes borderRotate {
  100% {
    --angle: 420deg;
  }
}

@keyframes borderRadial {
  20% {
    --gradX: 100%;
    --gradY: 50%;
  }
  40% {
    --gradX: 100%;
    --gradY: 100%;
  }
  60% {
    --gradX: 50%;
    --gradY: 100%;
  }
  80% {
    --gradX: 0%;
    --gradY: 50%;
  }
  100% {
    --gradX: 50%;
    --gradY: 0%;
  }
}

<script>
window.addEventListener("load", function () {
  var el = document.getElementById("dscnav");
  if (!el) return;

  var key = "dscnav_scroll_" + window.location.pathname;

  // vrati scroll poziciju nakon ucitavanja
  var saved = localStorage.getItem(key);
  if (saved !== null) {
    setTimeout(function () {
      el.scrollLeft = parseInt(saved, 10) || 0;
    }, 100);
  }

  // spremaj dok scrolla
  el.addEventListener("scroll", function () {
    localStorage.setItem(key, el.scrollLeft);
  });

  // dodatno spremi prije refresh / izlaska
  window.addEventListener("beforeunload", function () {
    localStorage.setItem(key, el.scrollLeft);
  });
});
</script>
